# Gateway Bridge — Basic Station backend (EU868)
# Listens on TCP 3001 for gateways using LNS protocol (RAK7268 Basic Station mode)
# Migrate gateways to this after Semtech UDP works

[backend]
  type = "basic_station"

  [backend.basic_station]
    bind = "0.0.0.0:3001"
    tls_cert = ""
    tls_key = ""
    ca_cert = ""
    stats_interval = "30s"
    ping_interval = "1m"
    timesync_interval = "1h"
    read_timeout = "1m5s"
    write_timeout = "1s"

    [backend.basic_station.region]
      name = "eu868"
      frequency_min = 863000000
      frequency_max = 870000000

      [[backend.basic_station.region.concentrators]]
        multi_sf = [868100000, 868300000, 868500000, 867100000, 867300000, 867500000, 867700000, 867900000]
        [backend.basic_station.region.concentrators.lora_std]
          frequency = 868300000
          bandwidth = 250000
          spreading_factor = 7
        [backend.basic_station.region.concentrators.fsk]
          frequency = 868800000

[integration]
  marshaler = "protobuf"

  [integration.mqtt]
    event_topic_template = "us915_0/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
    state_topic_template = "us915_0/gateway/{{ .GatewayID }}/state/{{ .StateType }}"
    command_topic_template = "us915_0/gateway/{{ .GatewayID }}/command/#"
    server = "tcp://mosquitto:1883/"
    json = false
