# Gateway Bridge — Semtech UDP packet forwarder backend (EU868)
# Listens on UDP 1700 for the RAK7268 in "Packet Forwarder" mode
# Translates UDP → MQTT and publishes to Mosquitto

[backend]
  type = "semtech_udp"

  [backend.semtech_udp]
    udp_bind = "0.0.0.0:1700"
    skip_crc_check = false
    fake_rx_time = false

[integration]
  marshaler = "protobuf"

  [integration.mqtt]
    event_topic_template = "us915_0/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
    state_topic_template = "us915_0/gateway/{{ .GatewayID }}/state/{{ .StateType }}"
    command_topic_template = "us915_0/gateway/{{ .GatewayID }}/command/#"
    server = "tcp://mosquitto:1883/"
    json = false
    keep_alive = 30
    clean_session = true
