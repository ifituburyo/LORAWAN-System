# ChirpStack v4 main configuration
# https://www.chirpstack.io/docs/chirpstack/configuration.html

[logging]
  level = "info"
  json = false

[postgresql]
  dsn = "postgres://chirpstack:chirpstack@postgres/chirpstack?sslmode=disable"
  max_open_connections = 10
  min_idle_connections = 0

[redis]
  servers = ["redis://redis:6379/"]

[network]
  net_id = "000000"
  # US915 is the band used in Rwanda (ITU Region 1)
  enabled_regions = ["us915"]

[network.scheduler]
  interval = "1s"
  batch_size = 100

[api]
  bind = "0.0.0.0:8080"
  secret = "CHANGE_ME_TO_A_RANDOM_32_BYTE_HEX_STRING_RUN_openssl_rand_hex_32"

# MQTT integration — this is how the Gateway Bridge talks to ChirpStack
[integration]
  enabled = ["mqtt"]

[integration.mqtt]
  event_topic = "application/+/device/+/event/+"
  command_topic = "application/+/device/+/command/+"
  server = "tcp://mosquitto:1883/"
  json = true

[monitoring]
  bind = "0.0.0.0:8070"
  api_request_log_max_history = 10

# UI customization — change branding for your customers
[ui]
  tileserver_url = "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
  tileserver_attribution = "© OpenStreetMap contributors"
