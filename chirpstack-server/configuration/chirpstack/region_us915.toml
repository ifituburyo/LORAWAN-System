# US915 region configuration — for bench testing with US915 hardware
# 64 uplink channels (902.3 - 914.9 MHz) + 8 uplink channels (903.0 - 914.2 MHz)
# Downlink: 923.3 - 927.5 MHz
# Regulatory: FCC Part 15.247, max EIRP +30 dBm
# Sub-band 1 (channels 0-7 + 64): the most common, used by TTN US915

[[regions]]
  name = "us915_0"
  description = "US915 sub-band 1 (channels 0-7) for bench testing"
  common_name = "US915"

  [regions.network]
    installation_margin = 10
    rx_window = 0
    rx1_delay = 1
    rx1_dr_offset = 0
    rx2_dr = 8
    rx2_frequency = 923300000
    uplink_max_eirp = 30
    adr_disabled = false
    min_dr = 0
    max_dr = 3

    enabled_uplink_channels = [0, 1, 2, 3, 4, 5, 6, 7, 64]

    [regions.network.class_b]
      ping_slot_dr = 8
      ping_slot_frequency = 923300000

  [regions.gateway]
    force_gws_private = false
    [regions.gateway.backend]
      enabled = "mqtt"
      [regions.gateway.backend.mqtt]
        event_topic = "us915_0/gateway/+/event/+"
        command_topic = "us915_0/gateway/{{gateway_id}}/command/{{command}}"
        server = "tcp://mosquitto:1883/"
        json = false
