# Mosquitto MQTT broker
# Used by ChirpStack internally AND exposed for customer integrations
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# For development only — in production:
#   - allow_anonymous false
#   - listener 8883 with TLS
#   - per-customer ACLs in /mosquitto/config/aclfile
