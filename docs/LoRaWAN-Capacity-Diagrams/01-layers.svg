<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    The Three-Layer Mental Model
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555" font-style="italic">
    Each layer has its own capacity limit — the one you hit first depends on your traffic pattern
  </text>

  <!-- Devices column -->
  <g transform="translate(60, 110)">
    <rect width="180" height="280" rx="12" fill="#fff" stroke="#2E75B6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F4E79">END DEVICES</text>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(sensors, meters)</text>

    <!-- Little device icons -->
    <g transform="translate(20, 70)">
      <rect width="40" height="55" rx="4" fill="#FFF8DC" stroke="#B8860B" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="6" fill="#B8860B"/>
      <line x1="10" y1="35" x2="30" y2="35" stroke="#B8860B" stroke-width="1"/>
      <line x1="10" y1="42" x2="30" y2="42" stroke="#B8860B" stroke-width="1"/>
      <line x1="10" y1="49" x2="30" y2="49" stroke="#B8860B" stroke-width="1"/>
    </g>
    <g transform="translate(70, 70)">
      <rect width="40" height="55" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="6" fill="#388E3C"/>
      <line x1="10" y1="35" x2="30" y2="35" stroke="#388E3C" stroke-width="1"/>
      <line x1="10" y1="42" x2="30" y2="42" stroke="#388E3C" stroke-width="1"/>
      <line x1="10" y1="49" x2="30" y2="49" stroke="#388E3C" stroke-width="1"/>
    </g>
    <g transform="translate(120, 70)">
      <rect width="40" height="55" rx="4" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="6" fill="#C2185B"/>
      <line x1="10" y1="35" x2="30" y2="35" stroke="#C2185B" stroke-width="1"/>
      <line x1="10" y1="42" x2="30" y2="42" stroke="#C2185B" stroke-width="1"/>
      <line x1="10" y1="49" x2="30" y2="49" stroke="#C2185B" stroke-width="1"/>
    </g>

    <text x="90" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">10s to millions</text>

    <!-- Bullets -->
    <text x="15" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333">• Battery-powered</text>
    <text x="15" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">• Tx once per hour-day</text>
    <text x="15" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333">• Compete for airtime</text>
    <text x="15" y="245" font-family="Arial, sans-serif" font-size="11" fill="#C62828" font-weight="bold">• ⚠ RF physics limit</text>
  </g>

  <!-- Gateways column -->
  <g transform="translate(290, 110)">
    <rect width="180" height="280" rx="12" fill="#fff" stroke="#2E75B6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F4E79">GATEWAYS</text>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(SX1302 concentrators)</text>

    <!-- Tower/gateway icon -->
    <g transform="translate(70, 70)">
      <!-- Tower base -->
      <rect x="15" y="40" width="10" height="35" fill="#5D4037"/>
      <!-- Antenna -->
      <line x1="20" y1="0" x2="20" y2="40" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="5" r="3" fill="#333"/>
      <!-- Box -->
      <rect x="5" y="35" width="30" height="20" rx="2" fill="#90A4AE" stroke="#37474F"/>
      <!-- Radio waves -->
      <path d="M 5,15 Q -5,20 5,30" stroke="#1976D2" stroke-width="1.5" fill="none"/>
      <path d="M 0,12 Q -10,20 0,32" stroke="#1976D2" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M 35,15 Q 45,20 35,30" stroke="#1976D2" stroke-width="1.5" fill="none"/>
      <path d="M 40,12 Q 50,20 40,32" stroke="#1976D2" stroke-width="1.5" fill="none" opacity="0.6"/>
    </g>

    <text x="90" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">1 to ~thousands</text>

    <text x="15" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333">• 8 channels each</text>
    <text x="15" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">• Forwards via IP</text>
    <text x="15" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333">• Listens 24/7</text>
    <text x="15" y="245" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">✓ Easy: buy more</text>
  </g>

  <!-- ChirpStack column -->
  <g transform="translate(520, 110)">
    <rect width="180" height="280" rx="12" fill="#fff" stroke="#2E75B6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F4E79">CHIRPSTACK NS</text>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(network server)</text>

    <!-- Server rack icon -->
    <g transform="translate(60, 70)">
      <rect width="60" height="75" rx="3" fill="#37474F" stroke="#263238" stroke-width="1.5"/>
      <rect x="5" y="8" width="50" height="12" rx="1" fill="#455A64"/>
      <circle cx="50" cy="14" r="2" fill="#76FF03"/>
      <rect x="5" y="25" width="50" height="12" rx="1" fill="#455A64"/>
      <circle cx="50" cy="31" r="2" fill="#76FF03"/>
      <rect x="5" y="42" width="50" height="12" rx="1" fill="#455A64"/>
      <circle cx="50" cy="48" r="2" fill="#76FF03"/>
      <rect x="5" y="59" width="50" height="12" rx="1" fill="#455A64"/>
      <circle cx="50" cy="65" r="2" fill="#FFC107"/>
    </g>

    <text x="90" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">1 instance</text>

    <text x="15" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333">• Auth, dedup, ADR</text>
    <text x="15" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">• Postgres + Redis</text>
    <text x="15" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333">• MQTT firehose</text>
    <text x="15" y="245" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">✓ Vertical scale</text>
  </g>

  <!-- Customer Apps column -->
  <g transform="translate(750, 110)">
    <rect width="180" height="280" rx="12" fill="#fff" stroke="#2E75B6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F4E79">CUSTOMER APPS</text>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(dashboards, ERPs)</text>

    <!-- Laptop / phone icons -->
    <g transform="translate(45, 75)">
      <rect width="50" height="35" rx="3" fill="#fff" stroke="#1976D2" stroke-width="2"/>
      <rect x="3" y="3" width="44" height="25" fill="#E3F2FD"/>
      <line x1="10" y1="10" x2="40" y2="10" stroke="#1976D2" stroke-width="1"/>
      <line x1="10" y1="16" x2="40" y2="16" stroke="#1976D2" stroke-width="1"/>
      <line x1="10" y1="22" x2="30" y2="22" stroke="#1976D2" stroke-width="1"/>
      <rect x="-5" y="33" width="60" height="3" fill="#1976D2"/>
    </g>
    <g transform="translate(105, 80)">
      <rect width="25" height="40" rx="3" fill="#fff" stroke="#666" stroke-width="1.5"/>
      <rect x="2" y="5" width="21" height="28" fill="#E8F5E9"/>
      <circle cx="12.5" cy="37" r="1.5" fill="#666"/>
    </g>

    <text x="90" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Their problem</text>

    <text x="15" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333">• MQTT subscribers</text>
    <text x="15" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">• REST API consumers</text>
    <text x="15" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333">• Webhook receivers</text>
    <text x="15" y="245" font-family="Arial, sans-serif" font-size="11" fill="#666">○ Outside our scope</text>
  </g>

  <!-- Arrows between columns -->
  <line x1="245" y1="245" x2="285" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">RF</text>
  <text x="265" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">LoRa</text>

  <line x1="475" y1="245" x2="515" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">IP</text>
  <text x="495" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">MQTT</text>

  <line x1="705" y1="245" x2="745" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="725" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">IP</text>
  <text x="725" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">REST/MQTT</text>

  <!-- Bottom: layer labels -->
  <g transform="translate(0, 420)">
    <rect x="60" y="0" width="640" height="50" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="380" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C62828">
      LAYER 1 (RADIO) — Hardest to fix; binds the whole system
    </text>
    <text x="380" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">
      Channel collisions, duty cycle, spreading factor. Cannot be solved with more compute.
    </text>

    <rect x="290" y="60" width="410" height="50" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
    <text x="495" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F57C00">
      LAYER 2 (GATEWAY) — Buy more boxes
    </text>
    <text x="495" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">
      8 simultaneous channels per gateway, ~100M packets/day each
    </text>

    <rect x="520" y="120" width="410" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="725" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">
      LAYER 3 (NS) — Vertical scale, then split components
    </text>
    <text x="725" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">
      Postgres + Redis + ChirpStack process. Easy to grow.
    </text>
  </g>
</svg>
