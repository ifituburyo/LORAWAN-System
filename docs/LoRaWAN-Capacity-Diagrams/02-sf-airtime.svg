<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="520" fill="url(#bgGrad2)"/>

  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    Spreading Factor: Range vs Airtime Trade-off
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555" font-style="italic">
    Every step up in SF doubles airtime but extends range — this is the central LoRaWAN trade-off
  </text>

  <!-- Column headers -->
  <text x="120" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">SF</text>
  <text x="280" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Airtime (10-byte payload)</text>
  <text x="650" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Typical range</text>
  <text x="880" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Data rate</text>

  <!-- SF7 row -->
  <g transform="translate(0, 130)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">SF7</text>
    <text x="120" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(short)</text>
    <!-- Bar -->
    <rect x="200" y="0" width="36" height="30" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="248" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~46 ms</text>
    <!-- Range bar -->
    <rect x="500" y="5" width="50" height="20" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="565" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">2–5 km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">5,470 bps</text>
  </g>

  <!-- SF8 -->
  <g transform="translate(0, 170)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#43A047">SF8</text>
    <rect x="200" y="0" width="60" height="30" fill="#81C784" stroke="#43A047" stroke-width="1.5"/>
    <text x="272" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~82 ms</text>
    <rect x="500" y="5" width="75" height="20" fill="#81C784" stroke="#43A047" stroke-width="1.5"/>
    <text x="590" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">3–7 km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">3,125 bps</text>
  </g>

  <!-- SF9 -->
  <g transform="translate(0, 210)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7CB342">SF9</text>
    <rect x="200" y="0" width="100" height="30" fill="#9CCC65" stroke="#7CB342" stroke-width="1.5"/>
    <text x="312" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~165 ms</text>
    <rect x="500" y="5" width="110" height="20" fill="#9CCC65" stroke="#7CB342" stroke-width="1.5"/>
    <text x="625" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">5–10 km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">1,760 bps</text>
  </g>

  <!-- SF10 -->
  <g transform="translate(0, 250)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FBC02D">SF10</text>
    <rect x="200" y="0" width="180" height="30" fill="#FFD54F" stroke="#FBC02D" stroke-width="1.5"/>
    <text x="392" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~330 ms</text>
    <rect x="500" y="5" width="150" height="20" fill="#FFD54F" stroke="#FBC02D" stroke-width="1.5"/>
    <text x="665" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">7–15 km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">980 bps</text>
  </g>

  <!-- SF11 -->
  <g transform="translate(0, 290)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FB8C00">SF11</text>
    <rect x="200" y="0" width="290" height="30" fill="#FFB74D" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="502" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~660 ms</text>
    <rect x="500" y="5" width="190" height="20" fill="#FFB74D" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="705" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">10–18 km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">440 bps</text>
  </g>

  <!-- SF12 -->
  <g transform="translate(0, 330)">
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C62828">SF12</text>
    <text x="120" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(longest)</text>
    <rect x="200" y="0" width="400" height="30" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
    <text x="612" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">~1,320 ms (1.3s!)</text>
    <rect x="500" y="5" width="240" height="20" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
    <text x="755" y="20" font-family="Arial, sans-serif" font-size="13" fill="#333">15–25+ km</text>
    <text x="880" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">250 bps</text>
  </g>

  <!-- Key insight callout box -->
  <g transform="translate(60, 410)">
    <rect width="880" height="85" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100">
      📊 Why this matters for capacity:
    </text>
    <text x="20" y="48" font-family="Arial, sans-serif" font-size="12" fill="#333">
      Each gateway has ≈ 8 simultaneous channels. An SF12 packet (1.3s) occupies a channel ~30× longer than an SF7 packet (46 ms).
    </text>
    <text x="20" y="68" font-family="Arial, sans-serif" font-size="12" fill="#333">
      In the same airtime budget, one gateway can carry <tspan font-weight="bold" fill="#2E7D32">~30× more SF7 devices than SF12 devices.</tspan> Use ADR to keep devices at low SF.
    </text>
  </g>
</svg>
