<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="580" fill="url(#bgGrad3)"/>

  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    Per-Gateway Capacity by Use Case
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555" font-style="italic">
    How many devices fit under one gateway depends entirely on how often they transmit
  </text>

  <!-- Scenario 1: Water meters -->
  <g transform="translate(50, 100)">
    <rect width="290" height="220" rx="12" fill="#fff" stroke="#2E7D32" stroke-width="2"/>
    <rect width="290" height="40" rx="12" fill="#2E7D32"/>
    <text x="145" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">
      ✓ EASY: Water Meters
    </text>

    <!-- Water meter icon -->
    <g transform="translate(110, 55)">
      <circle cx="35" cy="35" r="30" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
      <text x="35" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">💧</text>
    </g>

    <text x="145" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">1 reading / hour</text>
    <text x="145" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">SF7-SF9 (urban)</text>
    <text x="145" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">12 bytes payload, ADR-controlled</text>

    <rect x="20" y="200" width="250" height="10" fill="#E8F5E9" stroke="#2E7D32"/>
    <rect x="20" y="200" width="50" height="10" fill="#66BB6A"/>
    <text x="145" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2E7D32">
      Up to 10,000 devices
    </text>
  </g>

  <!-- Scenario 2: GPS trackers -->
  <g transform="translate(355, 100)">
    <rect width="290" height="220" rx="12" fill="#fff" stroke="#F57C00" stroke-width="2"/>
    <rect width="290" height="40" rx="12" fill="#F57C00"/>
    <text x="145" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">
      ⚠ MEDIUM: Asset Tracking
    </text>

    <!-- Truck icon -->
    <g transform="translate(110, 55)">
      <circle cx="35" cy="35" r="30" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
      <text x="35" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🚚</text>
    </g>

    <text x="145" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">1 update / 5 minutes</text>
    <text x="145" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">SF7-SF10 (mobile)</text>
    <text x="145" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">11 bytes payload, while moving</text>

    <rect x="20" y="200" width="250" height="10" fill="#FFF3E0" stroke="#F57C00"/>
    <rect x="20" y="200" width="120" height="10" fill="#FFB74D"/>
    <text x="145" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E65100">
      Up to 500–1,500
    </text>
  </g>

  <!-- Scenario 3: Real-time GPS -->
  <g transform="translate(660, 100)">
    <rect width="290" height="220" rx="12" fill="#fff" stroke="#C62828" stroke-width="2"/>
    <rect width="290" height="40" rx="12" fill="#C62828"/>
    <text x="145" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">
      ✗ HARD: Real-time GPS
    </text>

    <g transform="translate(110, 55)">
      <circle cx="35" cy="35" r="30" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
      <text x="35" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">📍</text>
    </g>

    <text x="145" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">1 update / 30 seconds</text>
    <text x="145" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">Mixed SF</text>
    <text x="145" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Will collide and saturate fast</text>

    <rect x="20" y="200" width="250" height="10" fill="#FFEBEE" stroke="#C62828"/>
    <rect x="20" y="200" width="220" height="10" fill="#EF5350"/>
    <text x="145" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#C62828">
      Under 100 devices
    </text>
  </g>

  <!-- Decision tree -->
  <g transform="translate(50, 360)">
    <rect width="900" height="180" rx="12" fill="#F5F5F5" stroke="#1F4E79" stroke-width="2"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F4E79">
      Quick capacity estimate per gateway
    </text>

    <text x="30" y="60" font-family="Arial, sans-serif" font-size="13" fill="#333">
      <tspan font-weight="bold" fill="#1F4E79">Rule of thumb formula:</tspan>
    </text>
    <rect x="30" y="70" width="840" height="30" fill="#fff" stroke="#999"/>
    <text x="450" y="91" text-anchor="middle" font-family="Courier, monospace" font-size="14" fill="#C62828" font-weight="bold">
      max_devices ≈ (3600 × 8 × 0.10) / (uplinks_per_hour × avg_airtime_seconds)
    </text>

    <text x="30" y="125" font-family="Arial, sans-serif" font-size="12" fill="#333">
      <tspan font-weight="bold">Example:</tspan> 1 uplink/hour, SF8 (82 ms = 0.082 s) → max = 2880 / (1 × 0.082) =
      <tspan font-weight="bold" fill="#2E7D32">~35,000 devices theoretical</tspan>
    </text>
    <text x="30" y="145" font-family="Arial, sans-serif" font-size="12" fill="#333">
      <tspan font-weight="bold">Real world:</tspan> halve for collisions, halve again for safety →
      <tspan font-weight="bold" fill="#2E7D32">~8,000–10,000 in practice</tspan>
    </text>
    <text x="30" y="165" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">
      The 0.10 factor = 10% channel utilisation. Above 20% collisions explode (ALOHA limit).
    </text>
  </g>
</svg>
