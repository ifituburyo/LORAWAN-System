<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
    <marker id="arr2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#1F4E79"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bgGrad5)"/>

  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    VPS Sizing Tiers: From Laptop to Million Devices
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555" font-style="italic">
    What hardware do you need at each scale? Real numbers, real costs.
  </text>

  <!-- 5 columns for 5 tiers -->
  <!-- Tier 0 -->
  <g transform="translate(40, 100)">
    <rect width="170" height="450" rx="12" fill="#fff" stroke="#90A4AE" stroke-width="2"/>
    <rect width="170" height="45" rx="12" fill="#607D8B"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Tier 0: BENCH</text>

    <text x="85" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Laptop</text>
    <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(where you are now)</text>

    <text x="15" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">2 cores</tspan></text>
    <text x="15" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">4-8 GB</tspan> RAM</text>
    <text x="15" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">SSD</tspan> any size</text>

    <line x1="15" y1="185" x2="155" y2="185" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Capacity:</text>
    <text x="15" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">• 1-3 gateways</text>
    <text x="15" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">• ~100 devices</text>
    <text x="15" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• Demo only</text>

    <line x1="15" y1="290" x2="155" y2="290" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="315" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Cost:</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">$0</text>
    <text x="85" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Reuse hardware</text>

    <rect x="15" y="395" width="140" height="40" rx="6" fill="#ECEFF1" stroke="#90A4AE"/>
    <text x="85" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Good for: testing</text>
    <text x="85" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">+ 1st customer demo</text>
  </g>

  <!-- Tier 1 -->
  <g transform="translate(225, 100)">
    <rect width="170" height="450" rx="12" fill="#fff" stroke="#43A047" stroke-width="2"/>
    <rect width="170" height="45" rx="12" fill="#43A047"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Tier 1: PILOT</text>

    <text x="85" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Hetzner CX22</text>
    <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">or DigitalOcean</text>

    <text x="15" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">2 vCPU</tspan></text>
    <text x="15" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">4 GB</tspan> RAM</text>
    <text x="15" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">40 GB</tspan> SSD</text>

    <line x1="15" y1="185" x2="155" y2="185" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Capacity:</text>
    <text x="15" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">• 5-10 gateways</text>
    <text x="15" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">• Up to <tspan font-weight="bold">2,000</tspan> dev</text>
    <text x="15" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• First paying client</text>

    <line x1="15" y1="290" x2="155" y2="290" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="315" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Cost:</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">~€5/mo</text>
    <text x="85" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">USD ~6/month</text>

    <rect x="15" y="395" width="140" height="40" rx="6" fill="#E8F5E9" stroke="#43A047"/>
    <text x="85" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Good for: pilot,</text>
    <text x="85" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1-2 customers</text>
  </g>

  <!-- Tier 2 -->
  <g transform="translate(410, 100)">
    <rect width="170" height="450" rx="12" fill="#fff" stroke="#1976D2" stroke-width="2"/>
    <rect width="170" height="45" rx="12" fill="#1976D2"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Tier 2: GROWTH</text>

    <text x="85" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Hetzner CX32</text>
    <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">or equivalent</text>

    <text x="15" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">4 vCPU</tspan></text>
    <text x="15" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">8 GB</tspan> RAM</text>
    <text x="15" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">80 GB</tspan> SSD</text>

    <line x1="15" y1="185" x2="155" y2="185" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Capacity:</text>
    <text x="15" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">• 30-50 gateways</text>
    <text x="15" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">• Up to <tspan font-weight="bold">20,000</tspan> dev</text>
    <text x="15" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• Multi-tenant</text>

    <line x1="15" y1="290" x2="155" y2="290" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="315" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Cost:</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">~€10/mo</text>
    <text x="85" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">USD ~12/month</text>

    <rect x="15" y="395" width="140" height="40" rx="6" fill="#E3F2FD" stroke="#1976D2"/>
    <text x="85" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Good for: 5-10</text>
    <text x="85" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">paying customers</text>
  </g>

  <!-- Tier 3 -->
  <g transform="translate(595, 100)">
    <rect width="170" height="450" rx="12" fill="#fff" stroke="#F57C00" stroke-width="2"/>
    <rect width="170" height="45" rx="12" fill="#F57C00"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Tier 3: SCALE</text>

    <text x="85" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Dedicated server</text>
    <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Hetzner AX/EX</text>

    <text x="15" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">8-16 cores</tspan></text>
    <text x="15" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">32-64 GB</tspan> RAM</text>
    <text x="15" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">NVMe SSD</tspan> RAID</text>

    <line x1="15" y1="185" x2="155" y2="185" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Capacity:</text>
    <text x="15" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">• 200+ gateways</text>
    <text x="15" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">• Up to <tspan font-weight="bold">100,000</tspan> dev</text>
    <text x="15" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• Regional ops</text>

    <line x1="15" y1="290" x2="155" y2="290" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="315" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Cost:</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">~€40/mo</text>
    <text x="85" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">USD ~45/month</text>

    <rect x="15" y="395" width="140" height="40" rx="6" fill="#FFF3E0" stroke="#F57C00"/>
    <text x="85" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Good for: WASAC,</text>
    <text x="85" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">REG sized clients</text>
  </g>

  <!-- Tier 4 -->
  <g transform="translate(780, 100)">
    <rect width="170" height="450" rx="12" fill="#fff" stroke="#C62828" stroke-width="2"/>
    <rect width="170" height="45" rx="12" fill="#C62828"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Tier 4: HA</text>

    <text x="85" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Split + replicated</text>
    <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Multiple servers</text>

    <text x="15" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">3+ servers</tspan></text>
    <text x="15" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">DB replica</tspan></text>
    <text x="15" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">HA Redis</tspan></text>

    <line x1="15" y1="185" x2="155" y2="185" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Capacity:</text>
    <text x="15" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">• 500+ gateways</text>
    <text x="15" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">• <tspan font-weight="bold">500,000+</tspan> dev</text>
    <text x="15" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• 99.9% SLA</text>

    <line x1="15" y1="290" x2="155" y2="290" stroke="#ccc" stroke-width="1"/>

    <text x="15" y="315" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-weight="bold">Cost:</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">€200+/mo</text>
    <text x="85" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">USD ~230/month</text>

    <rect x="15" y="395" width="140" height="40" rx="6" fill="#FFEBEE" stroke="#C62828"/>
    <text x="85" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Good for: national</text>
    <text x="85" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">+ regional operator</text>
  </g>

  <!-- Migration arrow at bottom -->
  <g transform="translate(50, 565)">
    <line x1="50" y1="0" x2="900" y2="0" stroke="#1F4E79" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="450" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1F4E79" font-style="italic">
      Growth path — each tier is a straightforward Postgres dump + restore migration
    </text>
  </g>
</svg>
