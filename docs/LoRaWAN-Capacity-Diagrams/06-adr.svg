<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#1F4E79"/>
    </marker>
  </defs>
  <rect width="1000" height="580" fill="url(#bgGrad6)"/>

  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    ADR (Adaptive Data Rate): Why It's the Most Important Lever
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555" font-style="italic">
    The network server tells each device to use the lowest SF that still works — multiplying capacity ~5×
  </text>

  <!-- WITHOUT ADR side -->
  <g transform="translate(50, 100)">
    <rect width="420" height="430" rx="12" fill="#fff" stroke="#C62828" stroke-width="2"/>
    <rect width="420" height="40" rx="12" fill="#C62828"/>
    <text x="210" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">
      ✗ Without ADR: every device at SF12
    </text>

    <!-- Gateway in center -->
    <g transform="translate(190, 200)">
      <line x1="20" y1="-30" x2="20" y2="30" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="-30" r="4" fill="#333"/>
      <rect x="0" y="20" width="40" height="25" rx="2" fill="#90A4AE" stroke="#37474F"/>
      <text x="20" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F4E79">Gateway</text>
    </g>

    <!-- 4 devices all transmitting SF12 (red) -->
    <g transform="translate(70, 90)">
      <rect width="35" height="45" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">SF12</text>
    </g>
    <g transform="translate(330, 90)">
      <rect width="35" height="45" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">SF12</text>
    </g>
    <g transform="translate(70, 310)">
      <rect width="35" height="45" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">SF12</text>
    </g>
    <g transform="translate(330, 310)">
      <rect width="35" height="45" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">SF12</text>
    </g>

    <!-- Big slow waves -->
    <path d="M 105,113 Q 150,170 195,200" stroke="#C62828" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 330,113 Q 290,170 235,200" stroke="#C62828" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 105,310 Q 150,260 195,235" stroke="#C62828" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 330,310 Q 290,260 235,235" stroke="#C62828" stroke-width="3" fill="none" opacity="0.7"/>

    <!-- Stats box -->
    <g transform="translate(85, 370)">
      <rect width="250" height="50" rx="6" fill="#FFEBEE" stroke="#C62828"/>
      <text x="125" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Each packet = <tspan font-weight="bold" fill="#C62828">1.3 seconds airtime</tspan></text>
      <text x="125" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Max devices/gateway: <tspan font-weight="bold" fill="#C62828">~200</tspan></text>
    </g>
  </g>

  <!-- WITH ADR side -->
  <g transform="translate(530, 100)">
    <rect width="420" height="430" rx="12" fill="#fff" stroke="#2E7D32" stroke-width="2"/>
    <rect width="420" height="40" rx="12" fill="#2E7D32"/>
    <text x="210" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff">
      ✓ With ADR: each device at minimum SF
    </text>

    <!-- Gateway in center -->
    <g transform="translate(190, 200)">
      <line x1="20" y1="-30" x2="20" y2="30" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="-30" r="4" fill="#333"/>
      <rect x="0" y="20" width="40" height="25" rx="2" fill="#90A4AE" stroke="#37474F"/>
      <text x="20" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F4E79">Gateway</text>
    </g>

    <!-- Close devices: SF7 (green) -->
    <g transform="translate(150, 110)">
      <rect width="35" height="45" rx="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">SF7</text>
    </g>
    <g transform="translate(255, 110)">
      <rect width="35" height="45" rx="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">SF7</text>
    </g>

    <!-- Medium devices: SF9 (yellow) -->
    <g transform="translate(60, 200)">
      <rect width="35" height="45" rx="3" fill="#FFCA28" stroke="#F9A825" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">SF9</text>
    </g>
    <g transform="translate(345, 200)">
      <rect width="35" height="45" rx="3" fill="#FFCA28" stroke="#F9A825" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">SF9</text>
    </g>

    <!-- Far devices: SF11 (orange) -->
    <g transform="translate(80, 320)">
      <rect width="35" height="45" rx="3" fill="#FB8C00" stroke="#E65100" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">SF11</text>
    </g>
    <g transform="translate(325, 320)">
      <rect width="35" height="45" rx="3" fill="#FB8C00" stroke="#E65100" stroke-width="1.5"/>
      <text x="17" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">SF11</text>
    </g>

    <!-- Thin waves for close, thicker for far -->
    <line x1="180" y1="155" x2="200" y2="195" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
    <line x1="280" y1="155" x2="225" y2="195" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>

    <line x1="95" y1="220" x2="195" y2="215" stroke="#F9A825" stroke-width="1.5" opacity="0.7"/>
    <line x1="345" y1="220" x2="240" y2="215" stroke="#F9A825" stroke-width="1.5" opacity="0.7"/>

    <path d="M 100,320 Q 150,290 200,240" stroke="#E65100" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M 340,320 Q 290,290 240,240" stroke="#E65100" stroke-width="2" fill="none" opacity="0.7"/>

    <!-- Stats box -->
    <g transform="translate(85, 370)">
      <rect width="250" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="125" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Avg packet = <tspan font-weight="bold" fill="#2E7D32">~150 ms airtime</tspan></text>
      <text x="125" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Max devices/gateway: <tspan font-weight="bold" fill="#2E7D32">~10,000</tspan></text>
    </g>
  </g>

  <!-- Magic insight box -->
  <g transform="translate(50, 545)">
    <rect width="900" height="30" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
    <text x="450" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">
      ⭐ <tspan font-weight="bold" fill="#E65100">ADR is enabled by default in ChirpStack.</tspan> Confirm device profiles have it on. It is the #1 capacity multiplier you don't pay for.
    </text>
  </g>
</svg>
