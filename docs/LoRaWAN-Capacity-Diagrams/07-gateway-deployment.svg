<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <radialGradient id="coverageGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.3"/>
      <stop offset="70%" style="stop-color:#4CAF50;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#eef2f5"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="620" fill="url(#bgGrad7)"/>

  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F4E79">
    Gateway Deployment Strategy
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555" font-style="italic">
    Phase 1 = Kigali only. Each gateway covers ~3-7 km radius. Build density before geography.
  </text>

  <!-- Map area -->
  <g transform="translate(80, 100)">
    <rect width="840" height="430" rx="8" fill="#F5F5F0" stroke="#999" stroke-width="1"/>

    <!-- City of Kigali outline (simplified blob) -->
    <path d="M 420,80
             Q 480,75 530,100
             Q 590,115 620,160
             Q 660,200 640,250
             Q 620,310 560,340
             Q 490,365 420,355
             Q 350,345 310,310
             Q 270,275 280,220
             Q 290,170 320,135
             Q 360,95 420,80 Z"
          fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>

    <text x="460" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" opacity="0.5">
      KIGALI
    </text>

    <!-- 5 gateways with coverage circles -->
    <!-- GW1: Nyamirambo area -->
    <circle cx="340" cy="280" r="100" fill="url(#coverageGrad)"/>
    <g transform="translate(330, 270)">
      <line x1="10" y1="-25" x2="10" y2="10" stroke="#1F4E79" stroke-width="2"/>
      <circle cx="10" cy="-25" r="3" fill="#1F4E79"/>
      <rect x="0" y="5" width="20" height="15" rx="2" fill="#1F4E79"/>
    </g>
    <text x="340" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1F4E79">GW1</text>
    <text x="340" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Nyamirambo</text>

    <!-- GW2: Kigali Heights / city center -->
    <circle cx="460" cy="200" r="100" fill="url(#coverageGrad)"/>
    <g transform="translate(450, 190)">
      <line x1="10" y1="-25" x2="10" y2="10" stroke="#1F4E79" stroke-width="2"/>
      <circle cx="10" cy="-25" r="3" fill="#1F4E79"/>
      <rect x="0" y="5" width="20" height="15" rx="2" fill="#1F4E79"/>
    </g>
    <text x="460" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1F4E79">GW2</text>
    <text x="460" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">CBD / Kigali Heights</text>

    <!-- GW3: Kacyiru -->
    <circle cx="560" cy="240" r="100" fill="url(#coverageGrad)"/>
    <g transform="translate(550, 230)">
      <line x1="10" y1="-25" x2="10" y2="10" stroke="#1F4E79" stroke-width="2"/>
      <circle cx="10" cy="-25" r="3" fill="#1F4E79"/>
      <rect x="0" y="5" width="20" height="15" rx="2" fill="#1F4E79"/>
    </g>
    <text x="560" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1F4E79">GW3</text>
    <text x="560" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Kacyiru</text>

    <!-- GW4: Kicukiro -->
    <circle cx="500" cy="310" r="100" fill="url(#coverageGrad)"/>
    <g transform="translate(490, 300)">
      <line x1="10" y1="-25" x2="10" y2="10" stroke="#1F4E79" stroke-width="2"/>
      <circle cx="10" cy="-25" r="3" fill="#1F4E79"/>
      <rect x="0" y="5" width="20" height="15" rx="2" fill="#1F4E79"/>
    </g>
    <text x="500" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1F4E79">GW4</text>
    <text x="500" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Kicukiro</text>

    <!-- GW5: Nyarutarama (E) -->
    <circle cx="600" cy="160" r="100" fill="url(#coverageGrad)"/>
    <g transform="translate(590, 150)">
      <line x1="10" y1="-25" x2="10" y2="10" stroke="#1F4E79" stroke-width="2"/>
      <circle cx="10" cy="-25" r="3" fill="#1F4E79"/>
      <rect x="0" y="5" width="20" height="15" rx="2" fill="#1F4E79"/>
    </g>
    <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1F4E79">GW5</text>
    <text x="600" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Nyarutarama</text>

    <!-- Coverage overlap indicator -->
    <text x="460" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" font-style="italic">
      Overlap is desirable — provides redundancy and gateway diversity for ADR
    </text>

    <!-- Legend -->
    <g transform="translate(40, 30)">
      <rect width="220" height="100" rx="6" fill="#fff" stroke="#999"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F4E79">Legend</text>
      <circle cx="20" cy="40" r="6" fill="#4CAF50" opacity="0.4"/>
      <text x="35" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">Coverage radius (~3-7 km)</text>
      <line x1="14" y1="60" x2="14" y2="73" stroke="#1F4E79" stroke-width="2"/>
      <rect x="9" y="73" width="10" height="6" rx="1" fill="#1F4E79"/>
      <text x="35" y="72" font-family="Arial, sans-serif" font-size="10" fill="#333">Gateway placement</text>
      <text x="10" y="92" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">Urban LoRaWAN coverage</text>
    </g>

    <!-- Outside Kigali pointer -->
    <g transform="translate(700, 90)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Phase 2: secondary cities</text>
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">(Musanze, Huye, Rubavu)</text>
    </g>
    <g transform="translate(700, 380)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Phase 3: rural agricultural</text>
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">corridors (tea, coffee)</text>
    </g>
  </g>

  <!-- Strategy table -->
  <g transform="translate(80, 550)">
    <rect width="840" height="55" rx="6" fill="#E3F2FD" stroke="#1F4E79"/>
    <text x="20" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F4E79">
      Density-first principle:
    </text>
    <text x="20" y="42" font-family="Arial, sans-serif" font-size="11" fill="#333">
      5 gateways in Kigali alone serve more devices than 50 gateways spread thinly across the country. Cover one city completely before expanding to the next.
    </text>
  </g>
</svg>
