# Reference: /etc/chirpstack-concentratord/concentratord.toml
# For SenseCAP M1 with RAK2287-based SX1302 concentrator on EU868
# This is a reference — on the actual gateway, symlink the one from
# /opt/chirpstack-concentratord/sx1302/rak_2287_eu868/ instead of replacing

[concentratord]
  disable_crc_filter = false

  [concentratord.api]
    event_bind = "ipc:///tmp/concentratord_event"
    command_bind = "ipc:///tmp/concentratord_command"

[gateway]
  antenna_gain = 0
  lorawan_public = true
  model = "rak_2287_eu868"
  model_flags = []
  time_fallback_enabled = false

  [gateway.location]
    latitude = -1.9536       # Kigali — update to your gateway's actual location
    longitude = 30.0606
    altitude = 1567

[[gateway.concentrators]]
  multi_sf_channels = [
    868100000, 868300000, 868500000,
    867100000, 867300000, 867500000, 867700000, 867900000,
  ]

  [gateway.concentrators.lora_std]
    frequency = 868300000
    bandwidth = 250000
    spreading_factor = 7

  [gateway.concentrators.fsk]
    frequency = 868800000
    datarate = 50000

  [gateway.concentrators.radios]
    [[gateway.concentrators.radios.tx_gain_table]]
      pa_gain = 0
      pwr_idx = 15
      rf_power = 14   # 14 dBm — legal max EIRP for EU868
