# Norani Portal — Nginx configuration
#
# Install:
#   sudo cp portal.conf /etc/nginx/sites-available/norani-portal.conf
#   sudo ln -s /etc/nginx/sites-available/norani-portal.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d portal.norani.rw   # adds TLS automatically

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name portal.norani.rw;

    # Allow Let's Encrypt challenge through HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.norani.rw;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/portal.norani.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.norani.rw/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Max upload size (for future bulk-device CSV import etc.)
    client_max_body_size 10M;

    # API → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # React SPA — serve static files, fall back to index.html for client routing
    location / {
        root /opt/norani-portal/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite includes hash in filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|woff2|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Don't cache index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Block access to dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
